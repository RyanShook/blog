{%- comment -%}
  Landing-page-style top bar (matches ryanshook.org).
  Preserves the search input + cancel button so Chirpy's search-loader/search-results
  pipeline keeps working untouched.
{%- endcomment -%}

<header class="rs-nav" id="topbar-wrapper" aria-label="Top Bar">
  <div class="container rs-nav-inner">
    <a href="https://ryanshook.org" class="rs-nav-mark">Ryan Shook<span class="dot">.</span></a>

    <nav aria-label="Primary">
      <ul class="rs-nav-links">
        <li class="d-none d-md-flex"><a href="{{ '/tags/' | relative_url }}">Tags</a></li>
        <li class="d-none d-md-flex"><a href="https://ryanshook.org">&larr; ryanshook.org</a></li>
        <li class="rs-nav-search">
          <search id="search">
            <i class="fas fa-search fa-fw" aria-hidden="true"></i>
            <input
              class="form-control"
              id="search-input"
              type="search"
              aria-label="Search"
              autocomplete="off"
              placeholder="{{ site.data.locales[include.lang].search.hint | capitalize }}..."
            >
          </search>
          <button type="button" class="btn btn-link text-decoration-none" id="search-cancel">
            {{- site.data.locales[include.lang].search.cancel -}}
          </button>
        </li>
        <li>
          <a href="https://ryanshook.org/#contact" class="btn btn-primary rs-nav-cta">Book a session</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
